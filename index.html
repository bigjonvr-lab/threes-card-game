<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Threes - Multi-Room Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Graduate', serif; background: #e0e0e0; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #BB0000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: white; text-align: center; }
        input { padding: 12px; border-radius: 6px; border: none; margin-bottom: 10px; width: 70%; font-family: 'Graduate'; text-align: center; }
        .view-section { display: none; flex: 1; flex-direction: column; padding: 10px; overflow-y: auto; }
        .active-view { display: flex; }
        header { background: #BB0000; color: white; padding: 10px; text-align: center; border-bottom: 4px solid #666666; flex-shrink: 0; }
        footer { background: #333; color: white; padding: 10px; height: 130px; overflow-y: auto; flex-shrink: 0; border-top: 4px solid #BB0000; }
        .discard-pile { background: white; border: 4px solid #666666; border-radius: 10px; width: 70px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 10px; }
        .card { background: white; padding: 10px 5px; border-radius: 6px; font-weight: bold; min-width: 42px; text-align: center; border: 1px solid #999; cursor: pointer; }
        .card.selected { background: #BB0000; color: white !important; border: 2px solid gold; transform: translateY(-5px); }
        button { padding: 12px; border-radius: 6px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; }
        .btn-scarlet { background: #BB0000; color: white; }
        .btn-gray { background: #666666; color: white; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">THREES</h1>
        <input type="text" id="name-input" placeholder="YOUR NAME">
        <input type="text" id="room-input" placeholder="ROOM NAME (ex: BigJon)">
        <button class="btn-gray" onclick="joinGame()">JOIN GAME</button>
        <p style="font-size: 0.7rem; margin-top: 15px;">SETS: 3 of a kind | RUNS: 3 in a suit</p>
    </div>

    <header>
        <div id="room-id">ROOM: ---</div>
        <div id="wild-display" style="color: gold;">WILD: 3s</div>
        <div id="turn-msg">LOBBY</div>
    </header>

    <div id="lobby-view" class="view-section active-view">
        <div id="lobby-list" style="background:white; border-radius:10px; padding:15px; margin-bottom:10px; color:black;"></div>
        <button class="btn-scarlet" onclick="socket.emit('add-ai', currentRoom)">ADD COMPUTER</button>
        <button class="btn-gray" style="margin-top:10px;" onclick="socket.emit('start-game', currentRoom)">START GAME</button>
    </div>

    <div id="game-view" class="view-section">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="discard-pile" id="last-card">--</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%;">
                <button id="draw-btn" class="btn-scarlet" onclick="draw()">DRAW</button>
                <button id="pickup-btn" class="btn-gray" onclick="take()">TAKE</button>
                <button id="out-btn" class="btn-scarlet" style="grid-column: span 2;" onclick="goOut()">I'M GOING OUT</button>
                <button id="end-btn" class="btn-gray" style="grid-column: span 2; display:none; border: 2px solid gold;" onclick="submit()">SUBMIT POINTS</button>
            </div>
            <p id="score-preview" style="color:#BB0000; font-weight:bold; margin-top:10px;"></p>
            <div id="my-hand" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;"></div>
        </div>
    </div>

    <footer>
        <div style="font-size: 0.7rem; color: #aaa;">RANKINGS (LOWEST WINS)</div>
        <table style="width:100%;"><tbody id="score-body"></tbody></table>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = "", myName = "", myHand = [], hasDrawn = false, isMyTurn = false, selected = [];

        function joinGame() {
            myName = document.getElementById('name-input').value || "Player";
            currentRoom = document.getElementById('room-input').value || "Default";
            document.getElementById('room-id').innerText = "ROOM: " + currentRoom;
            document.getElementById('splash-screen').style.display = 'none';
            socket.emit('join-room', { room: currentRoom, name: myName });
        }

        socket.on('update-lobby', (players) => {
            const list = document.getElementById('lobby-list');
            const scores = document.getElementById('score-body');
            list.innerHTML = ''; scores.innerHTML = '';
            players.sort((a,b) => a.score - b.score).forEach(p => {
                list.innerHTML += `<div style="padding:5px;">${p.name} - ${p.score} pts</div>`;
                scores.innerHTML += `<tr><td>${p.name}</td><td style="text-align:right;">${p.score}</td></tr>`;
            });
        });

        socket.on('game-start', (data) => {
            document.getElementById('lobby-view').classList.remove('active-view');
            document.getElementById('game-view').classList.add('active-view');
            document.getElementById('wild-display').innerText = "WILD: " + data.cards + "s";
        });

        socket.on('receive-hand', (hand) => { myHand = hand; renderHand(); });

        socket.on('update-turn', (data) => {
            isMyTurn = (data.activePlayer === myName);
            document.getElementById('turn-msg').innerText = isMyTurn ? "YOUR TURN" : data.activePlayer + "'S TURN";
            document.getElementById('draw-btn').disabled = !isMyTurn;
            document.getElementById('pickup-btn').disabled = !isMyTurn;
        });

        socket.on('update-discard', (c) => { document.getElementById('last-card').innerText = c; });

        socket.on('force-score-view', () => {
            document.getElementById('end-btn').style.display = 'block';
            document.getElementById('score-preview').innerText = "CLICK CARDS TO COUNT POINTS";
        });

        function renderHand() {
            const container = document.getElementById('my-hand');
            container.innerHTML = '';
            myHand.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card' + (selected.includes(i) ? ' selected' : '');
                div.innerText = card;
                div.style.color = (card.includes('♥') || card.includes('♦')) ? 'red' : 'black';
                div.onclick = () => handleCardClick(i);
                container.appendChild(div);
            });
        }

        function handleCardClick(i) {
            if (isMyTurn && hasDrawn && document.getElementById('end-btn').style.display === 'none') {
                const c = myHand[i]; myHand.splice(i,1); hasDrawn = false;
                socket.emit('play-card', { room: currentRoom, card: c, name: myName });
                renderHand();
            } else if (document.getElementById('end-btn').style.display === 'block') {
                if (selected.includes(i)) selected = selected.filter(s => s !== i);
                else selected.push(i);
                renderHand();
            }
        }

        function draw() { if(isMyTurn && !hasDrawn) { myHand.push("? "); hasDrawn = true; renderHand(); } }
        function goOut() { if(isMyTurn && !hasDrawn) { if(confirm("Go out? Game ends after this round.")) socket.emit('trigger-out', currentRoom); } }

        function submit() {
            // Point calculation logic here
            socket.emit('submit-score', { room: currentRoom, name: myName, points: selected.length * 5 }); // Example points
            document.getElementById('end-btn').style.display = 'none';
        }
    </script>
</body>
</html>
