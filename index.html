<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Threes - Varsity Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">
    <style>
        /* MOBILE-FIRST RESPONSIVE LAYOUT */
        body { 
            font-family: 'Graduate', serif; 
            background: #e0e0e0; 
            margin: 0; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* STATIC SPLASH SCREEN */
        #splash-screen { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #BB0000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
            color: white; 
            text-align: center; 
        }

        #shuffle-view { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #e0e0e0; 
            z-index: 900; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
        }
        
        .view-section { 
            display: none; 
            flex: 1; 
            flex-direction: column; 
            padding: 10px; 
            overflow-y: auto; 
        }
        .active-view { display: flex; }

        header { 
            background: #BB0000; 
            color: white; 
            padding: 10px; 
            text-align: center; 
            border-bottom: 4px solid #666666; 
            flex-shrink: 0; 
        }
        
        footer { 
            background: #333; 
            color: white; 
            padding: 10px; 
            border-top: 4px solid #BB0000; 
            height: 130px; 
            overflow-y: auto; 
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .discard-pile { 
            background: white; 
            border: 4px solid #666666; 
            border-radius: 10px; 
            width: 70px; height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
            margin-bottom: 10px; 
        }

        .hand { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            margin-top: 15px; 
            padding-bottom: 30px; 
        }

        .card { 
            font-family: sans-serif; 
            background: white; 
            padding: 10px 5px; 
            border-radius: 6px; 
            font-weight: bold; 
            min-width: 42px; 
            text-align: center; 
            border: 1px solid #999; 
            cursor: pointer; 
            user-select: none; 
            font-size: 1rem; 
        }

        .card.selected { 
            background: #BB0000; 
            color: white !important; 
            transform: translateY(-8px); 
            border: 2px solid #f1c40f; 
        }
        
        button { 
            font-family: 'Graduate', serif; 
            padding: 12px; 
            border-radius: 6px; 
            border: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 0.85rem; 
        }

        .btn-scarlet { background: #BB0000; color: white; }
        .btn-gray { background: #666666; color: white; }
        button:disabled { opacity: 0.3; pointer-events: none; }
        
        #wild-display { font-size: 1.1rem; color: #f1c40f; margin-top: 5px; }
        .scoreboard-title { 
            font-size: 0.7rem; 
            color: #aaa; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            position: sticky; 
            top: 0; 
            background: #333; 
            padding: 5px 0;
        }

        #score-preview { 
            color: #BB0000; 
            font-weight: bold; 
            margin: 5px 0; 
            height: 20px; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="font-size: 1.5rem; letter-spacing: 2px;">BIG JON GAMES</div>
        <h1 style="font-size: 3.5rem; margin: 10px 0;">THREES</h1>
        <button class="btn-gray" onclick="login()">ENTER GAME</button>
    </div>

    <div id="shuffle-view"><h2>DEALING HANDS...</h2></div>

    <header>
        <span id="round-info">VARSITY THREES</span>
        <div id="wild-display">WILD: 3s</div>
        <div id="turn-msg">WAITING FOR PLAYERS...</div>
    </header>

    <div id="lobby-view" class="view-section active-view">
        <div id="lobby-list" style="background:white; border-radius:10px; padding:15px; margin-bottom:20px; color:black;"></div>
        <button class="btn-scarlet" onclick="readyUp()">READY UP</button><br>
        <button class="btn-gray" id="start-btn" onclick="triggerStart()">START NEW GAME</button>
    </div>

    <div id="game-view" class="view-section">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="discard-pile" id="last-card">--</div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width: 400px;">
                <button id="draw-btn" class="btn-scarlet" onclick="drawCard()">DRAW</button>
                <button id="pickup-btn" class="btn-gray" onclick="takeDiscard()">TAKE</button>
                <button id="out-btn" class="btn-scarlet" style="grid-column: span 2;" onclick="triggerOut()">I'M GOING OUT</button>
                <button id="end-btn" class="btn-gray" style="grid-column: span 2; display:none; border: 2px solid gold;" onclick="submitFinalScore()">SUBMIT POINTS</button>
                <button id="deal-next-btn" class="btn-scarlet" style="grid-column: span 2; display:none; margin-top:10px;" onclick="dealNextRound()">DEAL NEXT ROUND</button>
            </div>

            <p id="score-preview"></p>
            <div class="hand" id="my-hand"></div>
        </div>
    </div>

    <footer>
        <div class="scoreboard-title">Season Totals</div>
        <table style="width:100%; border-collapse: collapse;"><tbody id="score-body"></tbody></table>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myHand = [], currentDiscard = "---", isMyTurn = false, hasDrawn = false, selectedForScoring = [];

        function login() { 
            myName = prompt("Enter your name:") || "Player " + Math.floor(Math.random()*100); 
            document.getElementById('splash-screen').style.display='none'; 
            socket.emit('join-game', myName); 
        }
