<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Threes - Varsity Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">
    <style>
        /* ANIMATIONS (Lobby Crash/Bounces) [Keep all existing animations here] */
        @keyframes letterBounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); } }

        /* --- NEW SHUFFLE ANIMATION --- */
        @keyframes shuffleCycle {
            0% { transform: translate(0, 0); opacity: 0; }
            10% { transform: translate(30px, -20px); opacity: 1; }
            40% { transform: translate(-30px, 20px) scale(1.1); }
            60% { transform: translate(30px, 20px) scale(0.9); }
            90% { transform: translate(-30px, -20px) opacity: 1; }
            100% { transform: translate(0, 0); opacity: 0; }
        }
        @keyframes cardFadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Varsity Layout and OSU Palette */
        body { font-family: 'Graduate', serif; background: #e0e0e0; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #BB0000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        
        /* Views */
        .view-section { display: none; flex: 1; flex-direction: column; padding: 15px; overflow-y: auto; }
        .active-view { display: flex; }

        header { background: #BB0000; color: white; padding: 10px; text-align: center; border-bottom: 4px solid #666666; }
        #turn-msg { min-height: 1.5rem; color: #f1c40f; font-size: 1.1rem; margin-top: 5px; }
        
        /* --- SHUFFLE VIEW STYLES --- */
        #shuffle-view { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #e0e0e0; z-index: 900; 
            display: none; align-items: center; justify-content: center; 
            flex-direction: column; 
            animation: cardFadeIn 0.5s forwards;
        }
        .shuffle-active { display: flex !important; }
        .shuffle-stack { position: relative; width: 80px; height: 110px; margin-bottom: 20px; }
        .shuffle-card-back { 
            position: absolute; width: 100%; height: 100%; 
            background: #666666; /* OSU Gray Back */
            border: 3px solid #BB0000; /* Scarlet Border */
            border-radius: 8px; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            opacity: 0; /* Start invisible */
        }
        /* Stagger the card start times for the chaotic shuffle cycle */
        .shuffle-card-back:nth-child(1) { animation: shuffleCycle 1s ease-in-out infinite; animation-delay: 0.0s; }
        .shuffle-card-back:nth-child(2) { animation: shuffleCycle 1s ease-in-out infinite; animation-delay: 0.2s; }
        .shuffle-card-back:nth-child(3) { animation: shuffleCycle 1s ease-in-out infinite; animation-delay: 0.4s; }
        .shuffle-card-back:nth-child(4) { animation: shuffleCycle 1s ease-in-out infinite; animation-delay: 0.6s; }
        .shuffle-card-back:nth-child(5) { animation: shuffleCycle 1s ease-in-out infinite; animation-delay: 0.8s; }

        /* Lobby, Game, Scoreboard [Keep existing styles] */
        .lobby-list { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin: 0 auto; }
        .player-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        
        .card { font-family: sans-serif; background: white; padding: 12px 6px; border-radius: 6px; font-weight: bold; min-width: 45px; text-align: center; border: 1px solid #999; cursor: pointer; }
        .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .discard-pile { background: white; border: 4px solid #666666; border-radius: 10px; width: 80px; height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 15px; }
        
        .scoreboard { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        footer { background: #333; color: white; padding: 10px; border-top: 4px solid #BB0000; }

        .btn-scarlet { background: #BB0000; color: white; }
        .btn-gray { background: #666666; color: white; }
        button { font-family: 'Graduate', serif; padding: 14px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; text-transform: uppercase; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-title">THREES</h1>
        <button class="osu-btn-large" onclick="joinGame()">JOIN LOBBY</button>
    </div>

    <div id="shuffle-view">
        <div class="shuffle-stack">
            <div class="shuffle-card-back"></div>
            <div class="shuffle-card-back"></div>
            <div class="shuffle-card-back"></div>
            <div class="shuffle-card-back"></div>
            <div class="shuffle-card-back"></div>
        </div>
        <div id="shuffle-info" style="font-weight: bold; font-size: 1.2rem; text-align: center;">SHUFFLING DECK...</div>
    </div>

    <header>
        <span id="round-info">LOBBY</span>
        <div id="turn-msg">WAITING...</div>
    </header>

    <div id="lobby-view" class="view-section active-view">
        <div class="lobby-list">
            <h3 style="text-align: center; margin-top: 0;">PLAYERS</h3>
            <div id="player-lobby-list"></div>
        </div>
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <button class="btn-scarlet" style="width: 200px;" onclick="toggleReady()">READY UP</button>
            <button class="btn-gray" style="width: 200px;" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div id="game-view" class="view-section">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="discard-pile" id="last-card">--</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%; max-width:400px;">
                <button id="draw-btn" class="btn-scarlet" onclick="drawFromDeck()">DRAW</button>
                <button id="pickup-btn" class="btn-gray" onclick="pickUpDiscard()">TAKE</button>
                <button id="out-btn" class="btn-scarlet" style="grid-column: span 2;" onclick="triggerOut()">I'M GOING OUT</button>
                <button id="end-btn" class="btn-gray" style="grid-column: span 2; display:none;" onclick="submitFinalScore()">SUBMIT SCORE</button>
            </div>
            <div class="hand" id="my-hand"></div>
            <p id="log" style="font-size:0.7rem; color:#888; font-style:italic;"></p>
        </div>
    </div>

    <footer>
        <table class="scoreboard">
            <tbody id="score-body"></tbody>
        </table>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myHand = [], currentDiscard = "---", isMyTurn = false, hasDrawn = false, cardsThisRound = 3;

        function joinGame() {
            myName = prompt("Enter Name:") || "Player";
            document.getElementById('splash-screen').style.display = 'none';
            socket.emit('join-game', myName);
        }

        function toggleReady() { socket.emit('player-ready'); }
        function startGame() { socket.emit('start-game-rotation'); }

        socket.on('update-lobby', (players) => {
            const lobbyList = document.getElementById('player-lobby-list');
            const scoreBody = document.getElementById('score-body');
            lobbyList.innerHTML = '';
            scoreBody.innerHTML = '';
            players.forEach(p => {
                lobbyList.innerHTML += `<div class="player-row"><span>${p.name}</span><span class="ready-dot">${p.ready ? 'READY' : '...'}</span></div>`;
                scoreBody.innerHTML += `<tr><td>${p.name}</td><td style="text-align:right;">${p.score}</td></tr>`;
            });
        });

        // --- NEW TRANSITION LOGIC ---

        // The dealer has hit Start - trigger the shuffle screen
        socket.on('shuffle-transition', () => {
            document.getElementById('round-info').innerText = "SHUFFLING";
            document.getElementById('turn-msg').innerText = "GET READY...";
            
            // Activate the fixed shuffling view on top of the lobby
            document.getElementById('shuffle-view').classList.add('shuffle-active');
        });

        // The shuffle is over - deal the cards and move to the game
        socket.on('game-transition', () => {
            // Remove the lobby
            document.getElementById('lobby-view').classList.remove('active-view');
            // Remove the fixed shuffle screen
            document.getElementById('shuffle-view').classList.remove('shuffle-active');
            
            // Active the game room
            document.getElementById('game-view').classList.add('active-view');
        });

        // ... (Keep all your existing JS code for cards, turns, and scoring)...
        socket.on('receive-hand', (hand) => { myHand = hand; hasDrawn = false; renderHand(); });
        socket.on('sync-round', (count) => { cardsThisRound = count; document.getElementById('round-info').innerText = `ROUND: ${cardsThisRound} CARDS`; });

        // (Create drawFromDeck, pickUpDiscard, and renderHand logic as provided previously)
        function drawFromDeck() { if(!isMyTurn || hasDrawn) return; myHand.push('K♠'); hasDrawn=true; renderHand(); }
        function pickUpDiscard() { if(!isMyTurn || hasDrawn) return; myHand.push(currentDiscard); hasDrawn=true; renderHand(); }

        function renderHand() {
            const container = document.getElementById('my-hand');
            container.innerHTML = '';
            myHand.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                if(card.includes('♥') || card.includes('♦')) div.style.color = '#BB0000';
                div.innerText = card;
                div.onclick = () => { if(isMyTurn && hasDrawn) { const c = myHand[i]; myHand.splice(i, 1); hasDrawn=false; renderHand(); socket.emit('play-card', {player:myName, card:c}); }};
                container.appendChild(div);
            });
        }

        socket.on('update-turn', (data) => {
            isMyTurn = (data.activePlayer === myName);
            document.getElementById('turn-msg').innerText = isMyTurn ? "YOUR TURN!" : data.activePlayer.toUpperCase() + "'S TURN";
            document.getElementById('draw-btn').disabled = !isMyTurn;
            document.getElementById('pickup-btn').disabled = !isMyTurn || currentDiscard === "---";
        });
        socket.on('update-discard', (c) => { currentDiscard = c; document.getElementById('last-card').innerText = c; });
    </script>
</body>
</html>
