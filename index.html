<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threes - Big Jon Games</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout Container */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar Style */
        #sidebar { width: 180px; background: #0f3460; border-right: 2px solid #e94560; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .player-item { padding: 10px; border-radius: 8px; background: #16213e; border: 1px solid transparent; transition: 0.3s; position: relative; font-weight: bold; }
        .player-item.active-turn { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); background: #1a1a2e; }
        .turn-pointer { display: none; color: #f1c40f; margin-right: 5px; }
        .active-turn .turn-pointer { display: inline; }

        /* Game Area Style */
        #game-table { flex: 1; padding: 20px; overflow-y: auto; }
        .game-box { max-width: 600px; margin: 0 auto; background: #16213e; padding: 20px; border-radius: 20px; }
        
        /* Buttons & Cards */
        .discard-area { background: #0f3460; padding: 15px; border-radius: 15px; margin: 15px 0; border: 3px solid #e94560; }
        #last-card { font-size: 4rem; font-weight: bold; height: 90px; display: flex; align-items: center; justify-content: center; }
        .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .card { background: white; color: black; padding: 12px 8px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; min-width: 45px; cursor: pointer; }
        .card.selected-points { border: 4px solid #e94560; background: #ff7675; color: white; }
        
        button { padding: 12px; margin: 5px; font-size: 1rem; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .deal-btn { background: #f1c40f; color: #1a1a2e; width: 100%; }
        .out-btn { background: #e94560; color: white; width: 100%; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f3460; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="font-size: 5rem; color: #e94560; margin: 0;">THREES</h1>
        <p style="color: #95a5a6;">BIG JON GAMES</p>
        <button onclick="startGame()" style="background:#e94560; color:white; width:200px;">ENTER</button>
    </div>

    <div id="main-container">
        <div id="sidebar">
            <h3 style="margin-top:0; font-size: 1rem; color: #95a5a6;">PLAYERS</h3>
            <div id="player-list">
                </div>
        </div>

        <div id="game-table">
            <div class="game-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span id="player-display" style="font-weight:bold;">---</span>
                    <span id="round-info" style="color:#f1c40f; font-weight:bold;">3 Cards</span>
                </div>

                <div class="discard-area"><div id="last-card">---</div></div>

                <button class="deal-btn" id="deal-btn" onclick="startNextRound()">DEAL ROUND</button>
                <div style="display: flex; justify-content: space-between;">
                    <button id="draw-btn" style="background:#27ae60; color:white; width:48%;" onclick="drawFromDeck()">DRAW</button>
                    <button id="pickup-btn" style="background:#00d2ff; color:black; width:48%;" onclick="pickUpDiscard()">TAKE</button>
                </div>

                <div class="hand" id="my-hand"></div>
                <button id="out-btn" class="out-btn" onclick="triggerOut()">I'M GOING OUT</button>
                <button id="end-btn" style="display:none; background:#8e44ad; color:white; width:100%;" onclick="submitFinalScore()">SUBMIT SCORE</button>

                <p id="log" style="font-size:0.75rem; color:#95a5a6; margin-top:20px;"></p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myHand = [], currentDiscard = "---", isMyTurn = false;
        let cardsThisRound = 3, pointsToSubmit = [], totalScore = 0;

        function startGame() {
            myName = prompt("Enter your name:") || "Player";
            document.getElementById('player-display').innerText = myName;
            document.getElementById('splash-screen').style.display = 'none';
            socket.emit('join-game', myName);
        }

        // Updated player list rendering
        socket.on('update-players', (players) => {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.id = 'player-' + p.name;
                div.className = 'player-item';
                div.innerHTML = `<span class="turn-pointer">➔</span> ${p.name}`;
                list.appendChild(div);
            });
        });

        // Highlight the current player in the sidebar
        socket.on('update-turn', (data) => {
            isMyTurn = (data.activePlayer === myName);
            
            // UI Update for sidebar
            document.querySelectorAll('.player-item').forEach(el => el.classList.remove('active-turn'));
            const activeEl = document.getElementById('player-' + data.activePlayer);
            if(activeEl) activeEl.classList.add('active-turn');

            // Button Control
            document.getElementById('draw-btn').disabled = !isMyTurn;
            document.getElementById('pickup-btn').disabled = (!isMyTurn || currentDiscard === "---");
            document.getElementById('out-btn').disabled = !isMyTurn;
        });

        // [Keep your previous functions for drawFromDeck, startNextRound, discard, etc.]
    </script>
</body>
</html>
