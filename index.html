<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threes - OSU Edition</title>
    <style>
        /* Ohio State Colors: Scarlet (#BB0000) and Gray (#666666) */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; color: #333; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #BB0000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        .osu-btn { background: #666666; color: white; padding: 15px 30px; font-size: 1.5rem; border: 2px solid white; border-radius: 5px; cursor: pointer; }

        /* Main Game Layout */
        #game-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* Header */
        header { background: #BB0000; color: white; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #round-info { font-weight: bold; font-size: 1.1rem; }

        /* Play Area */
        #play-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .discard-pile { background: white; border: 4px solid #666666; border-radius: 10px; width: 80px; height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; margin: 10px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 15px 0; }
        .card { background: white; color: black; padding: 10px 5px; border-radius: 5px; font-weight: bold; font-size: 1rem; min-width: 40px; text-align: center; border: 1px solid #ccc; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .card.selected-points { border: 3px solid #BB0000; background: #ffcccc; }

        /* Controls */
        .controls { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-scarlet { background: #BB0000; color: white; }
        .btn-gray { background: #666666; color: white; }
        button:disabled { opacity: 0.3; background: #999 !important; }
        .full-width { grid-column: span 2; }

        /* Bottom Player List (The Mobile Fix) */
        footer { background: #666666; color: white; padding: 10px; border-top: 3px solid #BB0000; }
        #player-list { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; justify-content: center; }
        .player-tag { background: #444; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; white-space: nowrap; border: 1px solid transparent; }
        .player-tag.active { background: #BB0000; border-color: white; font-weight: bold; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="font-size: 4rem; margin-bottom: 10px;">THREES</h1>
        <p style="margin-bottom: 30px; font-weight: bold; letter-spacing: 2px;">BIG JON GAMES</p>
        <button class="osu-btn" onclick="startGame()">ENTER LOBBY</button>
    </div>

    <div id="game-container">
        <header>
            <div id="round-info">ROUND: 3 CARDS (Wild: 3s)</div>
            <div id="turn-msg" style="font-size: 0.9rem; margin-top: 5px; font-weight: bold; color: #ffeb3b;">Waiting...</div>
        </header>

        <main id="play-area">
            <button class="btn-gray full-width" style="margin-bottom:10px" onclick="startNextRound()">DEAL NEXT ROUND</button>
            
            <div class="discard-pile" id="last-card">--</div>

            <div class="controls">
                <button id="draw-btn" class="btn-scarlet" onclick="drawFromDeck()">DRAW DECK</button>
                <button id="pickup-btn" class="btn-gray" onclick="pickUpDiscard()">TAKE DISCARD</button>
            </div>

            <div class="hand" id="my-hand"></div>

            <div class="controls">
                <button id="out-btn" class="btn-scarlet full-width" onclick="triggerOut()">I'M GOING OUT</button>
                <button id="end-btn" class="btn-gray full-width" style="display:none; background:#222;" onclick="submitFinalScore()">SUBMIT SCORE</button>
            </div>
            
            <p id="log" style="font-size:0.7rem; color:#666; margin-top:10px;"></p>
        </main>

        <footer>
            <div id="player-list">
                </div>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "", myHand = [], currentDiscard = "---", isMyTurn = false;
        let cardsThisRound = 3, pointsToSubmit = [], totalScore = 0;

        function startGame() {
            myName = prompt("Enter your name:") || "Player";
            document.getElementById('splash-screen').style.display = 'none';
            socket.emit('join-game', myName);
        }

        socket.on('update-players', (players) => {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach(p => {
                const div = document.createElement('div');
                div.id = 'tag-' + p.name;
                div.className = 'player-tag';
                div.innerText = p.name;
                list.appendChild(div);
            });
        });

        socket.on('update-turn', (data) => {
            isMyTurn = (data.activePlayer === myName);
            
            // Highlight player at bottom
            document.querySelectorAll('.player-tag').forEach(el => el.classList.remove('active'));
            const activeTag = document.getElementById('tag-' + data.activePlayer);
            if(activeTag) activeTag.classList.add('active');

            // Text update
            document.getElementById('turn-msg').innerText = isMyTurn ? "YOUR TURN!" : data.activePlayer + "'s Turn";

            // Buttons
            document.getElementById('draw-btn').disabled = !isMyTurn;
            document.getElementById('pickup-btn').disabled = (!isMyTurn || currentDiscard === "---");
            document.getElementById('out-btn').disabled = !isMyTurn;

            if (data.isEnding) document.getElementById('end-btn').style.display = 'block';
        });

        // [Keep all your existing JS logic for dealing, drawing, and scoring here]
        // Just make sure to use 'cardsThisRound' for your wild card math!
    </script>
</body>
</html>
